name: Deploy to Azure VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 20.46.255.27
          username: ubuntu
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            set -e

            echo "=== Pulling latest code ==="
            cd /opt/epistlo
            git pull origin main

            echo "=== Installing Python dependencies ==="
            source venv/bin/activate
            pip install -q -r requirements.txt

            echo "=== Building frontend ==="
            cd /opt/epistlo/frontend
            GENERATE_SOURCEMAP=false CI=false npm install --silent
            GENERATE_SOURCEMAP=false CI=false npm run build

            echo "=== Restarting backend ==="
            sudo systemctl restart epistlo-backend
            sleep 8

            echo "=== Health checks ==="
            curl -sf https://api.epistlo.com/health
            curl -sf https://api.epistlo.com/email/health
            curl -sf https://api.epistlo.com/mailbox/health

            echo "=== Deploy complete ==="
